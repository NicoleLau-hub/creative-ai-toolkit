<!DOCTYPE html>
<!--
  DEPLOYMENT
  ----------
  Repo structure:
    /index.html      ← this file
    /api/chat.js     ← Vercel serverless proxy (see that file)
    /vercel.json     ← { "rewrites": [{ "source": "/api/chat", "destination": "/api/chat" }] }

  Environment variable required in Vercel dashboard:
    ANTHROPIC_API_KEY = sk-ant-...

  The HTML fetches /api/chat — never api.anthropic.com directly.
  The API key is NEVER in this file.
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Creativity Isn't Gone — Nicole Lau</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F5F0E8;
      --cream-dark:  #EDE6D8;
      --taupe:       #C4B49A;
      --taupe-light: #D9CEBC;
      --brown:       #6B4F3A;
      --brown-light: #8B6B52;
      --sage:        #8A9E8C;
      --sage-dark:   #6B7F6D;
      --text:        #3A2E24;
      --text-light:  #6B5C4E;
      --white:       #FDFAF5;
      --card-bg:     #FAF8F4;
    }

    html, body {
      min-height: 100%;
      background: var(--cream-dark);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page wrapper ── */
    #page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ── Above-card header ── */
    #top-header {
      width: 100%;
      max-width: 580px;
      text-align: center;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      font-style: italic;
      font-size: 12px;
      color: #B0A08C;
      border: 1px solid var(--taupe-light);
      border-radius: 999px;
      padding: 3px 14px;
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    #top-header h1 {
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 400;
      font-style: normal;
      color: #9B8074;
      line-height: 1.25;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    #top-header .subtitle {
      font-size: clamp(28px, 4.5vw, 42px);
      font-weight: 700;
      font-style: normal;
      color: var(--brown-light);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    /* ── Chat card ── */
    #card {
      width: 100%;
      max-width: 580px;
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(107,79,58,0.13);
      border: 1px solid #E8DFD0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat messages area ── */
    #chat {
      padding: 28px 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      min-height: 320px;
      max-height: 460px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-thumb { background: var(--taupe-light); border-radius: 999px; }
    #chat { scrollbar-width: thin; scrollbar-color: var(--taupe-light) transparent; }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.35s ease forwards;
    }
    .msg-row.instant { opacity: 1; transform: none; animation: none; }
    .msg-row.user    { flex-direction: row-reverse; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .avatar {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
    }
    .avatar.asst { background: var(--taupe-light); color: var(--brown); }
    .avatar.usr  { background: var(--brown);       color: var(--cream); }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 13px 17px;
      font-size: 15.5px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 6px rgba(107,79,58,.07);
    }
    .bubble.asst { background: #fff;         color: var(--text); border-radius: 4px 18px 18px 18px; }
    .bubble.usr  { background: var(--brown); color: var(--white); border-radius: 18px 4px 18px 18px; text-align: right; }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: flex-end; gap: 10px; }
    .typing-bub {
      background: #fff;
      border-radius: 4px 18px 18px 18px;
      padding: 14px 18px;
      display: flex; gap: 5px; align-items: center;
      box-shadow: 0 1px 6px rgba(107,79,58,.07);
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--taupe);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── CTA card ── */
    #cta-card {
      display: none;
      background: linear-gradient(135deg, #F5F0E8 0%, #EDE6D8 100%);
      border: 1.5px solid var(--taupe-light);
      border-radius: 18px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 6px 32px rgba(107,79,58,.11);
      margin: 4px 0 8px;
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }

    #cta-card .ornament { font-size: 26px; margin-bottom: 10px; display: block; }

    #cta-card h3 {
      font-size: 19px; font-weight: 600; font-style: normal;
      color: var(--brown); margin: 0 0 10px; line-height: 1.35;
    }

    #cta-card .cta-desc {
      font-size: 14.5px; font-style: normal;
      color: #7A6655; line-height: 1.75; margin: 0 0 22px;
    }

    .btn-cta {
      display: block;
      padding: 15px 24px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px; font-style: normal;
      color: #fff;
      background: var(--sage);
      border: none; border-radius: 12px;
      text-decoration: none; text-align: center; cursor: pointer;
      box-shadow: 0 2px 12px rgba(138,158,140,.35);
      transition: background 0.2s;
      margin-bottom: 10px;
    }
    .btn-cta:hover { background: var(--sage-dark); }

    .cta-note { font-size: 12px; color: #B0A08C; font-style: normal; margin-bottom: 4px; }

    /* ── Card divider ── */
    .card-divider { height: 1px; background: var(--cream-dark); margin: 0 24px; }

    /* ── Input area ── */
    #input-area { padding: 16px 20px 18px; background: var(--card-bg); }

    #input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: #fff;
      border: 1.5px solid #E4D9CC;
      border-radius: 14px; padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(107,79,58,.05);
      transition: border-color .2s;
    }
    #input-wrap:focus-within { border-color: var(--taupe); }
    #input-wrap.disabled { opacity: .5; pointer-events: none; }

    #user-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15px; font-style: italic; color: var(--text);
      resize: none; max-height: 120px; min-height: 26px;
      line-height: 1.7; overflow-y: auto;
    }
    #user-input::placeholder { color: var(--taupe); }
    #user-input::-webkit-scrollbar { width: 3px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--taupe-light); border-radius: 999px; }

    #send-btn {
      flex-shrink: 0; background: transparent; border: none;
      cursor: pointer; padding: 3px 2px; color: var(--taupe);
      display: flex; align-items: center; transition: color .2s;
    }
    #send-btn:hover:not(:disabled) { color: var(--brown); }
    #send-btn:disabled { opacity: .4; cursor: default; }

    #footer-note {
      font-size: 11px; font-style: italic; color: var(--taupe);
      text-align: center; margin-top: 10px; line-height: 1.5;
    }
  </style>
</head>
<body>

<div id="page">

  <!-- Above-card header -->
  <div id="top-header">
    <p class="subtitle">A Personalized Roadmap Tool to Creative Clarity and Recovery</p>
    <h1>Your Creativity Isn't Gone</h1>
  </div>

  <!-- Chat card -->
  <div id="card">

    <!-- Messages -->
    <div id="chat" role="log" aria-live="polite"></div>

    <!-- Card divider -->
    <div class="card-divider"></div>

    <!-- Input -->
    <div id="input-area">
      <div id="input-wrap">
        <textarea
          id="user-input"
          placeholder="Share what's coming up for you..."
          rows="1"
          aria-label="Your message"
        ></textarea>
        <button id="send-btn" aria-label="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p id="footer-note">Responds uniquely to everything you type · Not a substitute for professional support</p>
    </div>

  </div><!-- /card -->

</div><!-- /page -->

<script>
'use strict';

/* ─── System prompt ─── */
const SYSTEM = `You are Nicole Lau — a multidisciplinary artist with training in body-based coaching and sound healing. You created this free tool because you lived through creative shutdown yourself, and found your way back not through force, but through learning to listen to your body differently.

Your job is to help creatives understand what's underneath their block through a warm, body-based, emotionally intelligent conversation. You are not here to give productivity tips. You are here to help them feel genuinely seen — and to offer a small, personalized body-based reset at the right moment.

ABSOLUTE RULES — never break these:
- NEVER use the word "somatic" anywhere, ever. Always say "body-based" instead.
- NEVER mention laziness, discipline, motivation, or productivity in any framing.
- NEVER use the phrase "1% safer" or any version of it.
- NEVER use clinical, structured, or worksheet-style language.
- NEVER use bullet-point lists. Ever. Write in flowing prose always.
- Ask exactly ONE question per message. Always.
- Always validate before you go anywhere else. Always.
- Be genuinely present — do not follow a visible script.

WHO YOU ARE TALKING TO:
Artists, writers, musicians, dancers, creatives who feel stuck, blocked, avoidant, numb, overwhelmed, or disconnected from work they care about.

PHASE 1 — UNDERSTANDING (exchanges 1–3):
Keep it light and conversational. One question at a time:
1. What kind of creative work feels blocked right now?
2. How does the block actually show up for you — like, what does a stuck day look like?
3. How long has it been feeling this way?

PHASE 2 — GOING DEEPER (1–2 questions only, chosen based on what they've shared):
Pick the most relevant one or two from this list — don't use all of them:
- What stories have you been telling yourself about why you're stuck?
- When you imagine putting your work out into the world, what comes up?
- Where do you feel the block in your body?
- If the block could speak, what would it be trying to protect you from?

Move to the reset after 5–6 exchanges total. Do not keep asking questions beyond that.

PHASE 3 — BODY-BASED RESET (after 5–6 exchanges):
Signal it warmly — something like: "I think I have a sense of what's going on. Can I offer you something?"

Then flow straight into the GENTLE BODY-BASED RESET in warm prose — no lists, no headers:

GROUNDING: "Before we go anywhere else, let's help your body feel safe right now. Not safe from the fear — safe with it. Stand or sit. Let your feet find the floor. Place both hands on your chest, right over your heart. Feel your hands there. Feel the warmth. Your own hands are holding you. Now breathe into your lower back ribs. Expand them on the inhale like a balloon filling slowly. Exhale and stay open. Do this three times, slowly."

AFFIRMATION — personalise completely based on what they shared:
- Fear of being seen: "I am allowed to be seen. My fear is trying to protect me, and I'm grateful for that. And right now, I am safe."
- Numbness/disconnection: "The quiet doesn't mean the creativity is gone. It's resting. And I can meet it gently."
- Perfectionism: "Showing up imperfectly is still showing up. My work doesn't have to be perfect to matter."
- Burnout/exhaustion: "Rest is part of the creative process. My body isn't failing me — it's asking for care."
- Fear of failure: "I don't have to know how it ends. I just have to take the next small step."
- Lost/disconnected: "I haven't lost it. I've just been under a lot. The love for this is still in me."

GENTLE PRACTICES — 1 to 2 small body-based practices specific to their situation. Written as warm suggestions, not instructions.

PHASE 4 — FINAL MESSAGE (immediately after the reset, no pause question):
Do NOT ask if they have questions or if there's anything else — this gives people an exit before they see what's next. Flow straight from the reset into the final message.

Keep it SHORT — 4 to 6 sentences maximum. No long reflections. This is read on mobile.

Cover only:
- One sentence naming their pattern warmly (protection, not failure)
- One sentence of reassurance (not broken, creativity still there)
- A natural one or two sentence bridge to the course: "If you want to go further with this — not just understand it, but actually move through it — I made something for exactly this. It's called Unblocked. A 1.5-hour body-based course with guided meditations and practices built specifically for creative block."

End your final message with EXACTLY: [SHOW_CTA]

STYLE: Warm, grounded, honest, human. Short paragraphs. Conversational. Never robotic, clinical, or listy.`;

/* ─── Opening message ─── */
const OPENING = `Creative block can feel so personal — especially when the work really matters to you. Whatever's going on, it doesn't mean something is wrong with you. Sometimes there's a much deeper pattern underneath it, and that's exactly what I want to help you explore.

By the end of this conversation I'll share a small body-based reset tailored to what comes up for you.

To start — what kind of creative work feels blocked right now?`;

/* ─── State ─── */
let history   = [];
let isLoading = false;

/* ─── DOM refs ─── */
const chatEl    = document.getElementById('chat');
const inputEl   = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const inputWrap = document.getElementById('input-wrap');

/* ─── Helpers ─── */
function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

function addMessage(role, text, instant) {
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '') + (instant ? ' instant' : '');

  const av = document.createElement('div');
  av.className = 'avatar ' + (role === 'user' ? 'usr' : 'asst');
  av.textContent = role === 'user' ? 'You' : 'NL';

  const bub = document.createElement('div');
  bub.className = 'bubble ' + (role === 'user' ? 'usr' : 'asst');
  bub.textContent = text;

  row.append(av, bub);
  chatEl.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';
  const av = document.createElement('div');
  av.className = 'avatar asst';
  av.textContent = 'NL';
  const bub = document.createElement('div');
  bub.className = 'typing-bub';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.append(av, bub);
  chatEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

/* ─── CTA card ─── */
function showCTA() {
  const card = document.createElement('div');
  card.id = 'cta-card';
  card.style.display = 'block';
  card.innerHTML = `
    <span class="ornament">✦</span>
    <h3>Ready to go deeper?</h3>
    <p class="cta-desc">Unblocked is a 1.5-hour body-based course for exactly this — creative block, the fear underneath it, and a gentle way through. Body-based teaching, guided meditations, and practices you can return to again and again.</p>
    <a class="btn-cta" href="https://nicolelau.ca/unblockedcourse" target="_blank" rel="noopener noreferrer">Explore Unblocked →</a>
    <p class="cta-note">A 1.5-hour body-based course for stuck artists</p>
  `;
  chatEl.appendChild(card);
  scrollBottom();
  inputWrap.classList.add('disabled');
}

/* ─── Auto-resize textarea ─── */
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

/* ─── Send ─── */
async function sendMessage() {
  if (isLoading) return;
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  isLoading = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM, messages: history })
    });

    if (!res.ok) {
      let msg = `Something went wrong (${res.status})`;
      try { const d = await res.json(); msg = d.error?.message || msg; } catch {}
      throw new Error(msg);
    }

    let data;
    try { data = await res.json(); } catch { throw new Error('Unexpected response from server.'); }

    if (!data.content || !Array.isArray(data.content)) {
      throw new Error('Unexpected response shape.');
    }

    const full     = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    const hasCTA   = full.includes('[SHOW_CTA]');
    const clean    = full.replace('[SHOW_CTA]', '').trimEnd();

    hideTyping();
    addMessage('assistant', clean);
    history.push({ role: 'assistant', content: clean });

    if (hasCTA) setTimeout(showCTA, 900);

  } catch (err) {
    hideTyping();
    addMessage('assistant', err.message || "Couldn't reach the server — please check your connection and try again.");
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
  }
}

/* ─── Event listeners ─── */
sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

/* ─── Init ─── */
history.push({ role: 'assistant', content: OPENING });
addMessage('assistant', OPENING, true);
inputEl.focus();
</script>
</body>
</html>
