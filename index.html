<!DOCTYPE html>
<!--
  DEPLOYMENT INSTRUCTIONS
  =======================
  This file is index.html. Deploy to Vercel with:

  api/chat.js  — Vercel serverless function that proxies to Anthropic API
  vercel.json  — can be empty {}

  The fetch calls /api/chat (relative URL), NOT api.anthropic.com directly.
  The API key lives ONLY in api/chat.js via process.env.ANTHROPIC_API_KEY.
  NEVER put the API key in this HTML file.

  File structure:
    /index.html       ← this file
    /api/chat.js      ← serverless proxy
    /vercel.json      ← {}
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Creativity Isn't Gone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Variables ── */
    :root {
      --cream:        #F5F0E8;
      --cream-dark:   #EDE6D8;
      --taupe:        #C4B49A;
      --taupe-light:  #D9CEBC;
      --brown:        #6B4F3A;
      --brown-light:  #8B6B52;
      --sage:         #8A9E8C;
      --sage-dark:    #6B7F6D;
      --text:         #3A2E24;
      --text-light:   #6B5C4E;
      --white:        #FDFAF5;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--cream-dark);
      color: var(--text);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 17px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout Shell ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ── Header ── */
    #header {
      flex-shrink: 0;
      padding: 24px 0 16px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-style: italic;
      font-size: 13px;
      color: var(--taupe);
      border: 1px solid var(--taupe-light);
      border-radius: 999px;
      padding: 3px 14px;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    #header h1 {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 400;
      color: var(--taupe);
      letter-spacing: -0.01em;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .subtitle {
      font-style: italic;
      font-size: 15px;
      color: var(--text-light);
    }

    .divider {
      margin-top: 16px;
      border: none;
      border-top: 1px solid var(--taupe-light);
      opacity: 0.7;
    }

    /* ── Chat Area ── */
    #chat {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 20px 0 12px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--taupe-light); border-radius: 999px; }
    #chat { scrollbar-width: thin; scrollbar-color: var(--taupe-light) transparent; }

    /* ── Message Rows ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.35s ease forwards;
    }

    .msg-row.instant {
      opacity: 1;
      transform: none;
      animation: none;
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Avatars */
    .avatar {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .avatar.assistant {
      background: var(--taupe-light);
      color: var(--brown);
    }

    .avatar.user-av {
      background: var(--brown);
      color: var(--cream);
    }

    /* Bubbles */
    .bubble {
      max-width: calc(100% - 52px);
      padding: 13px 17px;
      font-size: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.assistant {
      background: var(--cream);
      color: var(--text);
      border-radius: 4px 16px 16px 16px;
      box-shadow: 0 1px 3px rgba(107,79,58,0.07);
    }

    .bubble.user {
      background: var(--brown);
      color: var(--white);
      border-radius: 16px 4px 16px 16px;
      text-align: right;
    }

    /* ── Typing Indicator ── */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .typing-bubble {
      background: var(--cream);
      border-radius: 4px 16px 16px 16px;
      padding: 15px 20px;
      box-shadow: 0 1px 3px rgba(107,79,58,0.07);
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--taupe);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* ── Email Capture ── */
    #email-capture {
      background: var(--cream);
      border: 1px solid var(--taupe-light);
      border-radius: 16px;
      padding: 24px 22px;
      margin: 4px 0 8px;
      text-align: center;
      display: none;
      box-shadow: 0 2px 8px rgba(107,79,58,0.08);
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
    }

    #email-capture p {
      font-style: italic;
      font-size: 16px;
      color: var(--text-light);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .email-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .email-row input {
      flex: 1;
      padding: 10px 14px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15px;
      color: var(--text);
      background: var(--white);
      border: 1px solid var(--taupe-light);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .email-row input:focus { border-color: var(--taupe); }

    .email-row input::placeholder { color: var(--taupe); font-style: italic; }

    .btn-send-email {
      padding: 10px 18px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15px;
      font-weight: 500;
      background: var(--brown);
      color: var(--white);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-send-email:hover { background: var(--brown-light); }

    .btn-cta {
      display: block;
      width: 100%;
      padding: 13px;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      font-style: italic;
      color: var(--white);
      background: var(--sage);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: background 0.2s;
      margin-bottom: 10px;
    }

    .btn-cta:hover { background: var(--sage-dark); }

    .cta-note {
      font-size: 13px;
      color: var(--text-light);
      font-style: italic;
    }

    /* ── Input Area ── */
    #input-area {
      flex-shrink: 0;
      padding: 12px 0 8px;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--cream);
      border: 1.5px solid var(--taupe-light);
      border-radius: 14px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--taupe); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      font-style: italic;
      color: var(--text);
      resize: none;
      max-height: 120px;
      min-height: 26px;
      line-height: 1.6;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--taupe); }
    #user-input::-webkit-scrollbar { width: 4px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--taupe-light); border-radius: 999px; }

    #send-btn {
      flex-shrink: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--taupe);
      transition: color 0.2s;
      display: flex;
      align-items: center;
    }

    #send-btn:hover { color: var(--brown); }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    #send-btn svg { display: block; }

    .input-disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── Footer ── */
    #footer {
      flex-shrink: 0;
      text-align: center;
      padding: 6px 0 14px;
    }

    #footer p {
      font-size: 12.5px;
      font-style: italic;
      color: var(--taupe);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <span class="badge">free · no sign-up needed</span>
    <h1>Your Creativity Isn't Gone</h1>
    <p class="subtitle">A free AI tool for stuck artists — by Nicole Lau</p>
    <hr class="divider" />
  </header>

  <!-- Chat -->
  <div id="chat" role="log" aria-live="polite" aria-label="Conversation"></div>

  <!-- Input -->
  <div id="input-area">
    <div class="input-wrap" id="input-wrap">
      <textarea
        id="user-input"
        placeholder="Share what's coming up for you..."
        rows="1"
        aria-label="Your message"
      ></textarea>
      <button id="send-btn" aria-label="Send message">
        <!-- Paper plane SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Footer -->
  <footer id="footer">
    <p>Real version responds uniquely to everything you type · Not a substitute for professional support</p>
  </footer>

</div>

<script>
  /* =========================================================
     SYSTEM PROMPT
     ========================================================= */
  const SYSTEM_PROMPT = `You are Nicole Lau — a multidisciplinary artist with training in body-based coaching and sound healing. You created this free tool because you lived through creative shutdown yourself, and found your way back not through force, but through learning to listen to your body differently.

Your job is to help creatives understand what's underneath their block through a warm, body-based, emotionally intelligent conversation. You are not here to give productivity advice. You're here to help them feel genuinely seen — and to offer a small, personalized body-based reset at the right moment.

CRITICAL RULES — never break these:
- NEVER use the word "somatic" anywhere, ever. Always say "body-based" instead.
- NEVER frame block as laziness or discipline failure. Not even to dismiss it.
- NEVER say "1% safer" or any version of that phrase.
- NEVER use clinical or structured language. You are warm, human, conversational.
- NEVER send long bullet-point lists in early exchanges. Talk like a person.
- Ask ONE question at a time. Always.
- Validate before you analyze. Always.
- Do not follow a visible script. Be present and responsive to what they actually share.

WHO YOU'RE TALKING TO:
Artists, writers, creatives, hobbyists, passionate people who feel stuck, blocked, avoidant, overwhelmed, shut down, or disconnected from their work.

HOW THE CONVERSATION FLOWS:
- Start with the opening message (given separately). Ask what kind of creative work feels blocked.
- Over 5–7 exchanges, gently learn: what they do, how the block shows up, how long, what they feel emotionally, what they notice in their body, what they've tried, what they most want to feel instead.
- Keep responses short-to-medium. Warm. No bullet lists early on. Like a real conversation.
- Don't rush to insight. Let it develop naturally.

QUESTIONS TO WEAVE IN (not all at once — naturally, over time):
- What kind of creative work feels blocked right now?
- How does the block actually show up for you day to day?
- How long has it been feeling this way?
- What stories have been coming up about why you're stuck?
- When you imagine finishing a piece and putting it out into the world, what comes up?
- Where do you feel that in your body?
- If the block could speak, what would it be trying to protect you from?
- What have you already tried?
- What do you most want to feel in relation to your work?

WHEN TO OFFER THE RESET (after 4–6 substantive exchanges, when you have enough to personalize):
Signal it with something like: "I think I've heard enough to offer you something..."
Then give the BODY-BASED RESET PLAN — personalized to what they shared.

THE BODY-BASED RESET PLAN FORMAT:
Start with grounding: "Before we go anywhere else, let's help your body feel safe right now. Not safe from the fear — safe with it."
Then:
1. Grounding step: feet on floor, hands on chest/heart, feel the warmth, notice the support.
2. Breathing: breathe into the lower back ribs, expand on inhale, stay open on exhale, 3 times slowly.
3. A personalized affirmation — MUST be tailored to what they shared. Examples:
   - Fear of being seen: "I am allowed to be seen. My fear is just trying to protect me, and I'm grateful. And right now, I am safe."
   - Numbness/disconnection: "The quiet doesn't mean the creativity is gone. It's just resting. And I can meet it gently."
   - Perfectionism: "Showing up imperfectly is still showing up. My work doesn't have to be perfect to matter."
   - Burnout/exhaustion: "Rest is part of the creative process. My body isn't failing me — it's asking for care."
   - Fear of failure: "I don't have to know how it ends. I just have to take the next small step."
   - Feeling lost/disconnected from passion: "I haven't lost it. I've just been under a lot of pressure. The love for this is still in me."
4. Then 1–3 small, gentle practices — specific to their situation. Body-based re-entry, not productivity tactics.

AFTER THE RESET:
Say something like: "Thank you for staying with this. Before I share what came up for me — is there anything else sitting with you that you haven't quite found the words for yet?"

Wait for their response. Then after they reply, send your final message that:
- Warmly reflects what the whole conversation revealed
- Names the likely pattern underneath their block compassionately (protection, not failure)
- Gently explains why pushing harder hasn't worked
- Reassures them they are not broken
- Then naturally, briefly mentions the course: "If you want to go deeper with this — not just understand it, but actually work through it in a guided, body-based way — I made a 90-minute workshop for exactly this. It includes body-based teaching and guided meditations for creative block."

Then include this EXACT marker at the very end of your final message: [SHOW_EMAIL_CAPTURE]

STYLE:
- Warm, grounded, honest, human.
- Not clinical. Not preachy. Not structured like a worksheet.
- Talk the way Nicole would actually talk — from lived experience.
- Short paragraphs. Conversational sentences. Occasional gentle humor or humanity.
- Never robotic. Never hypey. Never pushy.
- If someone seems distressed, slow down and prioritize gentleness over gathering information.`;

  /* =========================================================
     OPENING MESSAGE
     ========================================================= */
  const OPENING_MESSAGE = `Creative block can feel incredibly personal, especially when you care deeply about your work. What you're going through doesn't mean something is wrong with you — sometimes there's a much deeper pattern underneath it.

I'm here to help you explore that gently, and by the end I'll share a small body-based reset based on what comes up for you.

To start — what kind of creative work feels blocked right now?`;

  /* =========================================================
     STATE
     ========================================================= */
  let conversationHistory = [];
  let isLoading = false;

  /* =========================================================
     DOM REFS
     ========================================================= */
  const chatEl      = document.getElementById('chat');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const inputWrap   = document.getElementById('input-wrap');

  /* =========================================================
     RENDER HELPERS
     ========================================================= */
  function createMessageRow(role, text, instant = false) {
    const row = document.createElement('div');
    row.className = 'msg-row' + (role === 'user' ? ' user' : '') + (instant ? ' instant' : '');

    const avatar = document.createElement('div');
    avatar.className = 'avatar ' + (role === 'user' ? 'user-av' : 'assistant');
    avatar.textContent = role === 'user' ? 'You' : 'NL';

    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'assistant');
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    return row;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing-indicator';

    const av = document.createElement('div');
    av.className = 'avatar assistant';
    av.textContent = 'NL';

    const bub = document.createElement('div');
    bub.className = 'typing-bubble';
    bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(av);
    row.appendChild(bub);
    chatEl.appendChild(row);
    scrollToBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function appendMessage(role, text, instant = false) {
    const row = createMessageRow(role, text, instant);
    chatEl.appendChild(row);
    scrollToBottom();
  }

  /* =========================================================
     EMAIL CAPTURE
     ========================================================= */
  function showEmailCapture() {
    // Build and insert the email capture card
    const card = document.createElement('div');
    card.id = 'email-capture';
    card.innerHTML = `
      <p>If this resonated, I'd love to stay in touch — and share a little more with you.</p>
      <div class="email-row">
        <input type="email" id="email-input" placeholder="your@email.com" aria-label="Email address" />
        <button class="btn-send-email" id="email-submit-btn">Send</button>
      </div>
      <a href="https://nicolelau.com/unblockedcourse" target="_blank" rel="noopener" class="btn-cta">
        Explore Unblocked →
      </a>
      <p class="cta-note">A 90-min body-based workshop for stuck artists</p>
    `;
    chatEl.appendChild(card);

    // Show with animation
    card.style.display = 'block';
    scrollToBottom();

    // Disable main chat input
    inputWrap.classList.add('input-disabled');

    // Email submit handler
    document.getElementById('email-submit-btn').addEventListener('click', handleEmailSubmit);
    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleEmailSubmit();
    });
  }

  function handleEmailSubmit() {
    const emailInput = document.getElementById('email-input');
    const submitBtn  = document.getElementById('email-submit-btn');
    const val = emailInput.value.trim();

    if (!val.includes('@')) {
      emailInput.style.borderColor = '#c0392b';
      setTimeout(() => emailInput.style.borderColor = '', 1200);
      return;
    }

    // Disable + confirm
    emailInput.disabled = true;
    submitBtn.disabled = true;
    emailInput.placeholder = 'Thank you ✦';
    emailInput.value = '';
    submitBtn.textContent = 'Sent ✦';

    // Optional: you could POST the email to another endpoint here
    // fetch('/api/email', { method: 'POST', body: JSON.stringify({ email: val }), headers: { 'Content-Type': 'application/json' } })
  }

  /* =========================================================
     AUTO-RESIZE TEXTAREA
     ========================================================= */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  /* =========================================================
     SEND MESSAGE
     ========================================================= */
  async function sendMessage() {
    if (isLoading) return;
    const text = inputEl.value.trim();
    if (!text) return;

    // Clear input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show user message
    appendMessage('user', text);

    // Add to history
    conversationHistory.push({ role: 'user', content: text });

    isLoading = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      if (!response.ok) {
        let errMsg = response.statusText;
        try {
          const errData = await response.json();
          errMsg = errData.error?.message || errMsg;
        } catch {}
        throw new Error(`Something went wrong (${response.status}): ${errMsg}`);
      }

      let data;
      try {
        data = await response.json();
      } catch {
        throw new Error('Received an unexpected response. Please try again.');
      }

      if (!data.content || !Array.isArray(data.content)) {
        throw new Error('Received an unexpected response. Please try again.');
      }

      const fullText = data.content.filter(b => b.type === 'text').map(b => b.text).join('');

      // Check for email capture marker
      const showCapture = fullText.includes('[SHOW_EMAIL_CAPTURE]');
      const cleanText   = fullText.replace('[SHOW_EMAIL_CAPTURE]', '').trimEnd();

      hideTyping();
      appendMessage('assistant', cleanText);

      // Store in history without marker
      conversationHistory.push({ role: 'assistant', content: cleanText });

      if (showCapture) {
        setTimeout(showEmailCapture, 800);
      }

    } catch (err) {
      hideTyping();
      let msg = err.message || 'Couldn\'t reach the server — please check your connection and try again.';
      if (msg === 'Failed to fetch') {
        msg = 'Couldn\'t reach the server — please check your connection and try again.';
      }
      appendMessage('assistant', msg);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
    }
  }

  /* =========================================================
     EVENT LISTENERS
     ========================================================= */
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  /* =========================================================
     INIT — show opening message
     ========================================================= */
  (function init() {
    conversationHistory.push({ role: 'assistant', content: OPENING_MESSAGE });
    appendMessage('assistant', OPENING_MESSAGE, true /* instant, no fade-in */);
    inputEl.focus();
  })();
</script>
</body>
</html>
